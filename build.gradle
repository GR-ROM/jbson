plugins {
    id 'java'
    id 'java-library'
    id 'maven-publish'
    id 'com.google.protobuf' version '0.9.4'
    id 'jacoco'
}

jacoco {
    toolVersion = "0.8.13"
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = true
        csv.required = true
    }
}

group = "su.grinev"

// jbson-jdk21 variant (toggle with -Pjdk21): swaps in the Java 21 ArenaByteBuffer (allocateDirect,
// auto-only), compiles main at release 21, and publishes as artifactId "jbson-jdk21". The Java 25 build
// owns the build counter; the jdk21 build reuses the current number so both stay lockstep at 0.8.0.<N>.
def jdk21 = project.hasProperty('jdk21')
def artifactName = jdk21 ? 'jbson-jdk21' : 'jbson'

// Build number — bumped on each (non-jdk21) publish (.build-number); forms the dev version 0.8.0.<N>.
def jbsonBuildFile = file('.build-number')
def jbsonBuildNumber = jbsonBuildFile.exists() ? jbsonBuildFile.text.trim() : '0'
if (!jdk21 && gradle.startParameter.taskNames.any { it.toLowerCase().contains('publish') }) {
    jbsonBuildNumber = ((jbsonBuildNumber.isInteger() ? jbsonBuildNumber.toInteger() : 0) + 1).toString()
    jbsonBuildFile.text = jbsonBuildNumber
}
// Real releases come from a vX.Y.Z tag via -PreleaseVersion (CI); dev/local builds are 0.8.0.<build>.
version = project.findProperty('releaseVersion') ?: ("0.8.0." + jbsonBuildNumber)
logger.lifecycle("jbson ${artifactName} ${version}")

if (jdk21) {
    // Use the Java 21 ArenaByteBuffer (src/jdk21) and drop the FFM one; compile the artifact at release 21.
    sourceSets.main.java.srcDir 'src/jdk21/java'
    sourceSets.main.java.exclude {
        it.file.absolutePath.replace('\\', '/').endsWith('/src/main/java/su/grinev/pool/ArenaByteBuffer.java')
    }
    tasks.named('compileJava') { options.release = 21 }
}

jar {
    manifest {
        attributes(
            'Implementation-Title': 'jbson',
            'Implementation-Version': version,
            'Implementation-Build': jbsonBuildNumber
        )
    }
}

// Expose version + build number at runtime (read by su.grinev.JbsonBuild) so consumers can log which build they run.
def jbsonBuildInfoDir = layout.buildDirectory.dir("generated/build-info")
def genJbsonBuildInfo = tasks.register('genJbsonBuildInfo') {
    inputs.property('version', version)
    inputs.property('build', jbsonBuildNumber)
    outputs.dir(jbsonBuildInfoDir)
    doLast {
        def f = jbsonBuildInfoDir.get().file('jbson-build.properties').asFile
        f.parentFile.mkdirs()
        f.text = "version=${version}\nbuild=${jbsonBuildNumber}\n"
    }
}
sourceSets.main.resources.srcDir(jbsonBuildInfoDir)
tasks.named('processResources') { dependsOn genJbsonBuildInfo }

repositories {
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

publishing {
    publications {
        gpr(MavenPublication) {
            from components.java
            groupId = group
            artifactId = artifactName
            version = version
        }
    }

    repositories {
        def githubActor = System.getenv("GITHUB_ACTOR") ?: project.findProperty("gpr.user")
        def githubToken = System.getenv("GITHUB_TOKEN") ?: project.findProperty("gpr.key")

        if (githubActor && githubToken) {
            maven {
                name = "GitHubPackages"
                url = uri("https://maven.pkg.github.com/GR-ROM/jbson")
                credentials {
                    username = githubActor
                    password = githubToken
                }
            }
        } else {
            logger.lifecycle("GITHUB_ACTOR/GITHUB_TOKEN are not set - skipping GitHubPackages repo")
        }
    }
}

dependencies {
    implementation 'org.projectlombok:lombok:1.18.42'
    annotationProcessor 'org.projectlombok:lombok:1.18.40'
    implementation 'org.slf4j:slf4j-api:2.0.13'

    testImplementation 'org.mongodb:bson:4.10.2'
    testImplementation(platform("org.junit:junit-bom:5.13.4"))
    testImplementation("org.junit.jupiter:junit-jupiter")
    testRuntimeOnly("org.junit.platform:junit-platform-launcher")

    // JMH for benchmarking
    testImplementation 'org.openjdk.jmh:jmh-core:1.37'
    testAnnotationProcessor 'org.openjdk.jmh:jmh-generator-annprocess:1.37'

    // Protobuf
    testImplementation 'com.google.protobuf:protobuf-java:3.25.1'

    // LZ4 compression (for benchmarks)
    testImplementation 'org.lz4:lz4-java:1.8.0'
}

protobuf {
    protoc {
        artifact = 'com.google.protobuf:protoc:3.25.1'
    }
    generateProtoTasks {
        all().each { task ->
            task.builtins {
                java {}
            }
        }
    }
}

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(25))
    }
}

test {
    useJUnitPlatform()
    // FFM Arena uses restricted native methods; allow them without the runtime warning.
    jvmArgs '--enable-native-access=ALL-UNNAMED'
    // The multi-second chaos/stress storm is not run as part of the normal suite — use `gradle chaos`.
    exclude '**/*ChaosTest*'
    if (jdk21) {
        // These assert FFM deterministic free / native address() — Java 25 (MANUAL) only.
        exclude '**/ArenaByteBufferTest*', '**/DisposablePoolArenaTrimTest*', '**/PoolOptimizerIntegrationTest*'
    }
    testLogging {
        showStandardStreams = true
    }
}

// Randomized, time-boxed chaos/stress tests. Run on demand; always re-executed (never cached).
task chaos(type: Test) {
    description = 'Runs the randomized FastPool chaos/stress tests.'
    group = 'verification'
    useJUnitPlatform()
    jvmArgs '--enable-native-access=ALL-UNNAMED'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    include '**/*ChaosTest*'
    outputs.upToDateWhen { false }
    testLogging {
        showStandardStreams = true
        events 'passed', 'failed'
    }
}

// JMH benchmark task
task jmh(type: JavaExec) {
    dependsOn testClasses
    mainClass = 'org.openjdk.jmh.Main'
    classpath = sourceSets.test.runtimeClasspath
    jvmArgs '--enable-native-access=ALL-UNNAMED'
}